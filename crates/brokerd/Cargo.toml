[package]
name    = "brokerd"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
runtime-core = { path = "../runtime-core" }
executor     = { path = "../executor" }
adapter-fs   = { path = "../adapter-fs" }
uuid         = { workspace = true }
anyhow       = { workspace = true }
tokio        = { workspace = true }
rusqlite     = { workspace = true }
sha2         = { workspace = true }
hex          = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
chrono       = { workspace = true }
# Default features only — do NOT add `features = [...]` enabling the
# `boring-tls` backend (RUSTSEC-2026-0141: silently disables TLS hostname
# verification). Mailpit needs no TLS at all; builder_dangerous bypasses it.
lettre       = "0.11.22"

[dev-dependencies]
runtime-core = { path = "../runtime-core" }
executor     = { path = "../executor" }
rusqlite     = { workspace = true }
uuid         = { workspace = true }
chrono       = { workspace = true }
tokio        = { workspace = true }
serde_json   = { workspace = true }
